<html lang="zh-CN">

  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.5,user-scalable=yes">

    body{background:#f0f2f5;font-family:'Nunito','Segoe UI','Poppins',system-ui,sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:1.2rem;color:#1a2632}
    .app-window{max-width:1200px;width:100%;background:#fff;border-radius:40px;box-shadow:0 12px 24px rgba(0,0,0,0.05);display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .3s ease-out}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .titlebar{background:#fff;padding:.8rem 1.8rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eef2f6}
    .logo-area h1{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#1f2c38,#f76504);-webkit-background-clip:text;background-clip:text;color:transparent;display:flex;align-items:center;gap:.5rem}
    .badge{background:#f2f5f8;color:#f76504;padding:.2rem .9rem;border-radius:40px;font-size:.65rem;font-weight:700}
    .status-badge{font-size:.7rem;background:#f0f4f8;padding:.25rem .8rem;border-radius:40px;color:#5d6f7e}
    .main-content{display:flex;gap:1.8rem;padding:1.5rem 1.8rem}
    .left-panel{width:42%;flex-shrink:0;display:flex;flex-direction:column;gap:1.2rem}
    .right-panel{width:58%;display:flex;flex-direction:column}
    .card{background:#fff;border-radius:28px;padding:1.2rem 1.4rem;border:1px solid #eef2f6;transition:transform .2s ease,box-shadow .2s ease}
    .card:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(0,0,0,0.04)}
    .card-header{font-weight:800;font-size:1rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem;color:#1f2c38;border-left:4px solid #f76504;padding-left:.7rem}
    .compact-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
    label{font-weight:700;font-size:.65rem;color:#5d6f7e;display:block;margin-bottom:.25rem;text-transform:uppercase}
    select,input{background:#fcfdfe;border:1.5px solid #e2e8f0;border-radius:20px;padding:.55rem .8rem;font-size:.8rem;width:100%;transition:border-color .15s,box-shadow .15s;outline:none;font-family:inherit;color:#1f2c38}
    input::placeholder{font-size:.7rem;color:#a0b0c0;font-weight:400}
    select:focus,input:focus{border-color:#f76504;box-shadow:0 0 0 2px rgba(247,101,4,0.1)}
    .btn-primary{background:linear-gradient(105deg,#f76504,#e05a00);color:#fff;border:none;padding:.75rem 1rem;border-radius:40px;font-weight:800;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;margin-top:.5rem;transition:transform .15s,box-shadow .15s;box-shadow:0 3px 8px rgba(247,101,4,0.2)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 12px rgba(247,101,4,0.25)}
    .btn-outline{background:transparent;border:1.5px solid #f76504;color:#f76504;padding:.5rem 1rem;border-radius:40px;font-weight:700;font-size:.75rem;cursor:pointer;transition:background .15s;width:100%;margin-top:.6rem}
    .btn-outline:hover{background:#fef3e8}
    .empty-state{color:#8f9eae;text-align:center;padding:1.5rem;font-size:.85rem}
    .tag{background:#f2f5f8;padding:.2rem .7rem;border-radius:40px;font-size:.6rem;font-weight:700;color:#f76504;display:inline-block}
    .tag.green{background:#e8f5e9;color:#2e7d32}
    .tag.blue{background:#e3f2fd;color:#1565c0}
    .tag.purple{background:#f3e5f5;color:#7b1fa2}
    .tag.orange{background:#fff3e0;color:#e65100}
    .tag.series{background:#f2f5f8;color:#f76504;padding:.25rem .8rem;border-radius:40px;font-size:.7rem;font-weight:800;display:inline-block}.tag.series.purple{background:#f3e5f5;color:#7b1fa2}.tag.series.speed{background:#ffebee;color:#c62828}
    .rec-card{display:flex;gap:.8rem;padding:.7rem;border-radius:20px;margin-bottom:.5rem;border:1px solid #eef2f6;background:#fcfdfe;align-items:center;flex-wrap:wrap}
    .rec-card.top{border:2px solid #f76504;background:#fffbf5}
    .rec-card .rank{font-size:1.5rem;font-weight:800;color:#f76504;min-width:30px;text-align:center}
    .rec-card .info{flex:1;min-width:180px}
    .rec-card .info .name{font-size:.85rem;font-weight:800;color:#1f2c38}
    .rec-card .info .specs{font-size:.65rem;color:#5d6f7e;margin-top:.2rem}
    .comp-compare-box{background:#f9fdf9;border:1px solid #4caf50;border-radius:20px;padding:.8rem 1rem;margin-bottom:.6rem}
    .comp-compare-box .vs-row{display:flex;gap:1rem;align-items:stretch;flex-wrap:wrap}
    .comp-compare-box .vs-col{flex:1;min-width:180px;padding:.5rem}
    .comp-compare-box .vs-col.left{background:#fff;border-radius:16px;border:1px solid #e0e0e0}
    .comp-compare-box .vs-col.right{background:#fffbf5;border-radius:16px;border:2px solid #f76504}
    .comp-compare-box .vs-label{font-size:.6rem;font-weight:700;color:#8f9eae;margin-bottom:.3rem}
    .comp-compare-box .vs-model{font-size:.8rem;font-weight:800;color:#1f2c38}
    .comp-compare-box .vs-hik-model{font-size:1rem;font-weight:800;color:#f76504}
    .comp-compare-box .vs-specs{font-size:.6rem;color:#5d6f7e;margin-top:.2rem;line-height:1.7}
    .comp-compare-box .vs-divider{display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;color:#4caf50}.comp-compare-box .vs-divider::after{content:"→"}
    .stitch-info{background:#e3f2fd;border:1px solid #2196f3;border-radius:12px;padding:.4rem .6rem;margin-top:.3rem;font-size:.65rem;color:#1565c0}
    .warning-badge{background:#fff3e0;color:#f76504;padding:.5rem 1rem;border-radius:40px;font-size:.75rem;font-weight:600;text-align:center}
    .model-list{max-height:60vh;overflow-y:auto;padding-right:.3rem}
    .model-list::-webkit-scrollbar{width:0}
    .model-list{scrollbar-width:none}
    .result-header{font-size:.7rem;color:#5d6f7e;margin-bottom:.6rem;line-height:1.5}
    .contact-bar{text-align:center;font-size:.65rem;color:#5d6f7e;margin-top:.6rem;padding:.4rem;background:#fafcfd;border-radius:12px;border:1px dashed #eef2f6}
    @media(max-width:800px){
      .main-content{flex-direction:column}
      .left-panel,.right-panel{width:100%}
      .compact-grid{grid-template-columns:1fr;gap:.8rem}
      .comp-compare-box{display:flex;justify-content:center}
      .comp-compare-box .vs-row{flex-direction:column;align-items:center;width:100%;max-width:400px}
      .comp-compare-box .vs-col{width:100%}
      .comp-compare-box .vs-divider::after{content:"↓"}
    }
  </style>
</head>

      <div class="card">

        <button class="btn-outline" id="compOnlyBtn">🔍 竞品对标查询</button>
        <div class="contact-bar">📞 详细需求联系海康技术支持</div>
      </div>
    </div>
    <div class="right-panel" id="rightPanel">

  function zAtSize(m,ps){

  }

  }function showSelectionResult(rru,ps,zr){

        if(!xOk){var n=Math.ceil(ps/m.xFar);stitchHTML='<div class="stitch-info">📌 拼接: '+n+'台 '+m.model+' | X轴 '+m.xFar+'mm × '+n+' = '+m.xFar*n+'mm ≥ '+ps+'mm | 单台zRepeat@'+ps+'mm: '+zz.display+' μm</div>'}
        h+='<div class="rec-card'+(i<2?' top':'')+'"><div class="rank">#'+(i+1)+'</div><div class="info"><div class="name">'+m.model+' '+serTag+' '+tags.join('')+'</div>';
        h+='<div class="specs">z重复精度@'+ps+'mm: <strong>'+zz.display+' μm</strong> (全量程: '+m.zRepeatDisplay+' μm) | X轴: '+m.xNear+'~'+m.xFar+'mm | Z景深: '+m.zRange+'mm | '+m.light+' | '+m.maxFreq+'KHz</div>';
        h+=stitchHTML+'</div></div>';
      });
      h+='</div>';
    }
    document.getElementById('resultArea').innerHTML=h;
  }

  document.getElementById('runBtn').addEventListener('click',function(){
    var rr=parseFloat(document.getElementById('reqRepeatability').value);
    var ps=parseFloat(document.getElementById('productSize').value);
    var zr=parseFloat(document.getElementById('reqZRange').value)||0;
    if(isNaN(rr)||isNaN(ps)||rr<=0||ps<=0){document.getElementById('resultArea').innerHTML='<div class="warning-badge">⚠️ 请填写重复性精度需求和产品短边尺寸</div>';return}
    showSelectionResult(rr*1000,ps,zr);
  });

  document.getElementById('compOnlyBtn').addEventListener('click',function(){
    var cb=document.getElementById('competitorBrand').value;
    var cm=document.getElementById('competitorModel').value.trim();
    if(!cm){document.getElementById('resultArea').innerHTML='<div class="warning-badge">⚠️ 请输入友商型号</div>';return}
    showCompResult(fc(cb,cm),cb);
  });
})();
</script>
</body>
</html>
